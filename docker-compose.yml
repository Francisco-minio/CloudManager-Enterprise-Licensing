version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: m365_db
    restart: always
    environment:
      - POSTGRES_USER=m365_admin
      - POSTGRES_PASSWORD=strong_password_123
      - POSTGRES_DB=365_licenses
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: m365_app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sobrescribimos la URL de DB para que apunte al servicio del contenedor 'db'
      - DATABASE_URL=postgresql+asyncpg://m365_admin:strong_password_123@db:5432/365_licenses

volumes:
  postgres_data:
