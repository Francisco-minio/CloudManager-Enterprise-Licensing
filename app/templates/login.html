<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 365 License Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .btn-microsoft {
            background-color: #2f2f2f;
            color: white;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s;
        }
        .btn-microsoft:hover {
            background-color: #000;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="fw-bold mb-2">Bienvenido</h3>
    <p class="text-secondary mb-5">Gestor de Licencias Microsoft 365</p>
    
    <a href="/login/microsoft" class="btn btn-microsoft w-100 d-flex align-items-center justify-content-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" width="20" class="me-2">
        Iniciar Sesión con Microsoft
    </a>
    
    <div class="mt-5">
        <small class="text-muted">Acceso restringido a administradores</small>
    </div>
</div>

</body>
</html>
